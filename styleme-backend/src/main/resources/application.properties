spring.application.name=styleme-backend
server.port=8080
server.address=0.0.0.0

spring.datasource.url=${SUPABASE_JDBC_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

openai.api-key=${OPENAI_API_KEY:}
styleme.upload-dir=uploads
styleme.public-base-url=${STYLEME_PUBLIC_BASE_URL:http://localhost:8080}

spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=12MB
